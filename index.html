document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()});
async function unlock(){
  const pw=document.getElementById('pw').value;
  if(!pw)return;
  try{
    const salt=Uint8Array.from(atob(D.salt),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(D.iv),c=>c.charCodeAt(0));
    const tag=Uint8Array.from(atob(D.tag),c=>c.charCodeAt(0));
    const ct=Uint8Array.from(atob(D.ct),c=>c.charCodeAt(0));
    const enc=new TextEncoder();
    const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveBits','deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']);
    const combined=new Uint8Array(ct.length+tag.length);
    combined.set(ct);combined.set(tag,ct.length);
    const decrypted=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,combined);
    const html=new TextDecoder().decode(decrypted);
    document.getElementById('gate').style.display='none';
    const iframe=document.createElement('iframe');
    iframe.className='content';
    iframe.srcdoc=html;
    document.body.appendChild(iframe);
    document.title='BJ Hub - 北京女生验证区聚合';
  }catch(e){
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
