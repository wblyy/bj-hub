async function dec(){
  const pw=document.getElementById('pw').value;if(!pw)return;
  try{
    const enc=new TextEncoder();const salt=Uint8Array.from(atob(ED.salt),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(ED.iv),c=>c.charCodeAt(0));const tag=Uint8Array.from(atob(ED.tag),c=>c.charCodeAt(0));

    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
