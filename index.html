document.getElementById('pwd').addEventListener('keypress',e=>{if(e.key==='Enter')unlock()});
async function unlock(){
const pwd=document.getElementById('pwd').value;
try{
const enc=new TextEncoder();
const salt=Uint8Array.from(atob(D.salt),c=>c.charCodeAt(0));
const iv=Uint8Array.from(atob(D.iv),c=>c.charCodeAt(0));
const ct=Uint8Array.from(atob(D.ct),c=>c.charCodeAt(0));
const km=await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveKey']);
const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
const html=new TextDecoder().decode(pt);
document.getElementById('gate').style.display='none';
const f=document.createElement('iframe');
f.srcdoc=html;
document.body.appendChild(f);
}catch(e){document.getElementById('err').style.display='block'}
}
</script>
