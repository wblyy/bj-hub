async function dec(){
  const pw=document.getElementById('pw').value;if(!pw)return;
  try{
    const enc=new TextEncoder();const salt=Uint8Array.from(atob(ED.salt),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(ED.iv),c=>c.charCodeAt(0));const tag=Uint8Array.from(atob(ED.tag),c=>c.charCodeAt(0));
    const ct=Uint8Array.from(atob(ED.ct),c=>c.charCodeAt(0));
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const combined=new Uint8Array(ct.length+tag.length);combined.set(ct);combined.set(tag,ct.length);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,combined);
    const html=new TextDecoder().decode(dec);
    document.getElementById('gate').style.display='none';
    const iframe=document.createElement('iframe');iframe.srcdoc=html;document.body.appendChild(iframe);
  }catch(e){document.getElementById('err').style.display='block';}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')dec();});
